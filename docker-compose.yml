# Піднімає весь "smoker": 3 provider-сервіси + orchestrator + gateway + postgres.
# Перед запуском створіть .env з TELEGRAM_TOKEN (див. .env.example).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smoker
      POSTGRES_PASSWORD: smoker
      POSTGRES_DB: smoker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smoker -d smoker"]
      interval: 5s
      timeout: 3s
      retries: 10

  cosmos:
    build:
      context: .
      args: { SERVICE: cosmos }
    environment:
      GRPC_ADDR: ":9101"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped

  chronos:
    build:
      context: .
      args: { SERVICE: chronos }
    environment:
      GRPC_ADDR: ":9102"
      COUNTRY_CODE: ${COUNTRY_CODE:-UA}
      WIKI_LANG: ${WIKI_LANG:-uk}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped

  chaos:
    build:
      context: .
      args: { SERVICE: chaos }
    environment:
      GRPC_ADDR: ":9103"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      args: { SERVICE: orchestrator }
    environment:
      GRPC_ADDR: ":9100"
      COSMOS_ADDR: cosmos:9101
      CHRONOS_ADDR: chronos:9102
      CHAOS_ADDR: chaos:9103
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on: [cosmos, chronos, chaos]
    restart: unless-stopped

  gateway:
    build:
      context: .
      args: { SERVICE: gateway }
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:?задайте TELEGRAM_TOKEN у .env}
      DATABASE_URL: postgres://smoker:smoker@postgres:5432/smoker?sslmode=disable
      ORCHESTRATOR_ADDR: orchestrator:9100
      DEFAULT_PLACE: ${DEFAULT_PLACE:-Київ}
      DEFAULT_LAT: ${DEFAULT_LAT:-50.4501}
      DEFAULT_LON: ${DEFAULT_LON:-30.5234}
      DEFAULT_TZ: ${DEFAULT_TZ:-Europe/Kyiv}
      DEFAULT_INTERVAL_MIN: ${DEFAULT_INTERVAL_MIN:-90}
      WORK_START_HOUR: ${WORK_START_HOUR:-9}
      WORK_END_HOUR: ${WORK_END_HOUR:-19}
      WIKI_LANG: ${WIKI_LANG:-uk}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      orchestrator:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
